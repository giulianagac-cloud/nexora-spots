  <div id="flyer">
    <div class="mesh-bg"></div>
    <div class="grain"></div>
    
    <div class="content">
      <div class="logo-main">NEXORA<span class="cursor">_</span></div>
      <div class="logo-sub">Intelligence</div>
      
      <div class="badge">🚀 Ya estamos online</div>
      
      <div class="tagline">
        <p>&gt; Tu operación funciona.</p>
        <p>&gt; Nosotros la hacemos <span class="highlight">escalar</span>.</p>

      <div class="services">
        <div class="service-item">Desarrollo Web</div>
        <div class="service-item">Apps a Medida</div>

        <div class="service-item">Bots IA</div>

  <div class="controls">
    <button id="downloadBtn">⬇️ Descargar (1080x1080)</button>

    📱 Listo para Instagram/LinkedIn/Facebook
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script>
    document.getElementById('downloadBtn').addEventListener('click', function() {
      const flyer = document.getElementById('flyer');
      const button = this;
      
      button.textContent = '⏳ Generando...';
      button.disabled = true;
      
      html2canvas(flyer, {
        width: 1080,
        height: 1080,
        scale: 2,
        backgroundColor: '#0A0E27',
        logging: false,
        useCORS: true
      }).then(canvas => {
        canvas.toBlob(function(blob) {
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.download = 'nexora-lanzamiento-1080x1080.png';
          link.href = url;
          link.click();
          
          button.textContent = '✅ ¡Descargado!';
          button.disabled = false;
          
          setTimeout(() => {
            button.textContent = '⬇️ Descargar (1080x1080)';
          }, 3000);
        }, 'image/png');
      });
    });
  </script>
