```html
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXORA Intelligence - WhatsApp Banner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }

    #banner {
      width: 1500px;
      height: 500px;
      position: relative;
      background: #0A0E27;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    /* Mesh gradient animado */
    .mesh-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 25% 35%, rgba(0, 245, 160, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 75% 65%, rgba(0, 217, 255, 0.08) 0%, transparent 50%);
      filter: blur(60px);
    }

    /* Grain texture */
    .grain {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* Contenido */
    .content {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* Código decorativo */
    .code-label {
      position: absolute;
      top: 20px;
      left: 30px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #00F5A0;
      opacity: 0.6;
    }

    /* Logo principal */
    .logo {
      margin-bottom: 8px;
    }

    .logo-main {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 140px;
      color: #00F5A0;
      letter-spacing: -0.02em;
      line-height: 1;
      text-shadow: 0 0 30px rgba(0, 245, 160, 0.3);
    }

    .cursor {
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .logo-sub {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 56px;
      color: #FFFFFF;
      letter-spacing: -0.01em;
      margin-top: -10px;
    }

    /* Tagline */
    .tagline {
      margin-top: 30px;
      margin-bottom: 30px;
    }

    .tagline p {
      font-family: 'Inter', sans-serif;
      font-size: 26px;
      color: #FFFFFF;
      line-height: 1.5;
      margin: 0;
    }

    .tagline .highlight {
      color: #00F5A0;
      font-weight: 500;
    }

    /* Tags finales */
    .tags {
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      color: #A0A0A8;
      font-weight: 500;
    }

    .tags .dot {
      color: #00F5A0;
      margin: 0 10px;
    }

    /* Controles */
    .controls {
      margin-top: 30px;
      display: flex;
      gap: 15px;
    }

    button {
      padding: 12px 24px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }

    #downloadBtn {
      background: #00F5A0;
      color: #0A0E27;
      box-shadow: 4px 4px 0px rgba(0, 245, 160, 0.3);
    }

    #downloadBtn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px #00F5A0;
    }

    #downloadBtn:active {
      transform: translate(0, 0);
      box-shadow: 4px 4px 0px rgba(0, 245, 160, 0.3);
    }

    .info {
      margin-top: 20px;
      color: #A0A0A8;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div id="banner">
    <div class="mesh-bg"></div>
    <div class="grain"></div>
    
    <div class="code-label">// Sistema activo</div>
    
    <div class="content">
      <div class="logo">
        <div class="logo-main">NEXORA<span class="cursor">_</span></div>
        <div class="logo-sub">Intelligence</div>
      </div>
      
      <div class="tagline">
        <p>&gt; Tu operación funciona.</p>
        <p>&gt; Nosotros la hacemos <span class="highlight">escalar</span>.</p>
      </div>
      
      <div class="tags">
        Consultoría IT<span class="dot">•</span>Automatización<span class="dot">•</span>Bots IA
      </div>
    </div>
  </div>

  <div class="controls">
    <button id="downloadBtn">⬇️ Descargar PNG (1500x500)</button>
  </div>

  <div class="info">
    📱 Listo para WhatsApp Business | Se descarga automáticamente
  </div>

  <!-- html2canvas library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script>
    document.getElementById('downloadBtn').addEventListener('click', function() {
      const banner = document.getElementById('banner');
      const button = this;
      
      // Cambiar texto del botón
      button.textContent = '⏳ Generando imagen...';
      button.disabled = true;
      
      html2canvas(banner, {
        width: 1500,
        height: 500,
        scale: 2, // Mejor calidad
        backgroundColor: null,
        logging: false,
        useCORS: true
      }).then(canvas => {
        // Convertir a blob y descargar
        canvas.toBlob(function(blob) {
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.download = 'nexora-intelligence-whatsapp-banner.png';
          link.href = url;
          link.click();
          
          // Restaurar botón
          button.textContent = '✅ ¡Descargado! Click para descargar de nuevo';
          button.disabled = false;
          
          setTimeout(() => {
            button.textContent = '⬇️ Descargar PNG (1500x500)';
          }, 3000);
        }, 'image/png');
      });
    });
  </script>

</body>
</html>
